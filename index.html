<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">


    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/ico" href="favicon.ico">

    <style>
      html, body { margin: 0; padding: 0; }

      #q-app {
        animation: appFadeIn 0.1s ease forwards;
      }

      @keyframes appFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      #app-loading-static {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        pointer-events: none;
      }

      #app-loading-static-logo {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      #app-loading-static-logo img {
        width: 100%;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
      }
    </style>
    <script>
      // Pre-paint the correct background color from persisted wallet state
      // to avoid a white flash during page reloads (e.g. wallet switching).
      (function () {
        var themeBg = {
          'glassmorphic-blue': { dark: '#273746', light: '#ecf3f3' },
          'glassmorphic-gold': { dark: '#3d3224', light: '#fff8e1' },
          'glassmorphic-green': { dark: '#263d32', light: '#e8f5e9' },
          'glassmorphic-red': { dark: '#462733', light: '#f3ecec' },
          'payhero': { dark: '#012121', light: '#ecf3f3' },
        }
        try {
          var raw = localStorage.getItem('vuex')
          if (!raw) return
          var s = JSON.parse(raw)
          var g = s.global || {}
          var idx = g.walletIndex || 0
          var vault = (g.vault || [])[idx]
          var settings = (vault && vault.settings) || {}
          var theme = settings.theme || g.theme || 'glassmorphic-blue'
          var darkMode = settings.darkMode !== undefined ? settings.darkMode : (s.darkmode && s.darkmode.darkmode)
          var colors = themeBg[theme] || themeBg['glassmorphic-blue']
          var bg = darkMode ? colors.dark : colors.light
          document.documentElement.style.backgroundColor = bg
          document.body && (document.body.style.backgroundColor = bg)

          // Style the static loading logo to match theme
          var logo = document.getElementById('app-loading-static-logo')
          if (logo) {
            if (darkMode) {
              logo.style.background = 'rgba(255, 255, 255, 0.05)'
              logo.style.border = '2px solid rgba(255, 255, 255, 0.15)'
              logo.style.boxShadow = '0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset'
            } else {
              logo.style.background = 'rgba(255, 255, 255, 0.5)'
              logo.style.border = '2px solid rgba(255, 255, 255, 0.6)'
              logo.style.boxShadow = '0 12px 40px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.3) inset'
            }
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app-loading-static">
      <div id="app-loading-static-logo">
        <img src="icons/favicon-128x128.png" alt="">
      </div>
    </div>
    <!-- quasar:entry-point -->
  </body>
</html>
